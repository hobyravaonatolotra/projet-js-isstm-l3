<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Générateur d'Idées IA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <h1>💡 Idée Maker</h1>
        <p id="idea-display">Cliquez pour générer une idée...</p>
        <button onclick="generateIdea()">Générer une idée</button>
        
        <hr style="margin: 30px 0;">
        
        <h3>Ajouter une idée</h3>
        <input type="text" id="new-idea-input" placeholder="Votre idée géniale...">
        <button onclick="addIdea()" style="background: #03dac6; color: black;">Ajouter</button>
    </div>
    <script src="script.js"></script>

</body>
</html>
